<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Realtime World — QuakeView</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600&family=Share+Tech+Mono&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css">
  <link rel="stylesheet" href="../css/quakeview.css">
</head>
<body class="rw-page">

<!-- ══ HEADER ════════════════════════════════════════════════ -->
<header class="rw-header">
  <span class="rw-header-title">REALTIME WORLD</span>
  <span class="rw-header-sub">全世界地震リアルタイムモニタ</span>
  <div class="rw-header-legend">
    <span class="et-legend-item">
      <span class="et-legend-line" style="--et-line-color:var(--cyan)"></span>P/Pdiff
    </span>
    <span class="et-legend-item">
      <span class="et-legend-line" style="--et-line-color:#64dfdf"></span>PKPdf
    </span>
    <span class="et-legend-item">
      <span class="et-legend-line" style="--et-line-color:var(--yellow)"></span>S
    </span>
    <span class="et-legend-item">
      <span class="et-legend-line" style="--et-line-color:var(--orange)"></span>SKSdf
    </span>
  </div>
</header>

<!-- ══ BODY ══════════════════════════════════════════════════ -->
<div class="rw-body">

  <!-- ── 左パネル ──────────────────────────────────────────── -->
  <div class="rw-left">

    <!-- イベントリスト -->
    <div class="card rw-left-events" id="xml-card">
      <div class="et-card-header">
        <span class="section-label">XML IMPORT</span>
        <div class="et-btn-group">
          <button id="btn-fetch-xml" class="btn et-btn-sm">↻ FETCH</button>
          <span class="et-or-sep">or</span>
          <label class="et-file-label" id="lbl-file">
            📂
            <input type="file" id="xml-file-input" accept=".xml,text/xml,application/xml" hidden>
          </label>
        </div>
      </div>
      <div class="et-url-row">
        <input type="text" id="xml-url"
               placeholder="https://early-est.rm.ingv.it/monitor.xml"
               value="http://early-est.rm.ingv.it/monitor.xml">
        <button id="btn-xml-autofetch" class="btn secondary et-btn-sm"
                title="10秒ごとに自動取得">⏱ AUTO</button>
      </div>
      <div id="xml-event-list" class="et-event-list">
        <div class="et-event-placeholder">-- XMLを読み込んでください --</div>
      </div>
      <div id="xml-status" class="et-status-text"></div>
    </div>

    <!-- 地震波到着時刻カウントダウン -->
    <div class="card rw-left-arrivals">
      <div class="arr-hdr-row et-arr-hdr">
        <span>PHASE</span>
        <span>走時</span>
        <span>到着時刻</span>
        <span class="et-text-right">COUNTDOWN</span>
      </div>
      <div id="arrival-list">
        <div id="arrival-placeholder" class="arr-none">-- No Event --</div>
      </div>
    </div>

    <!-- 現在地設定 -->
    <div class="card rw-left-location">
      <div class="controls-row">
        <input type="hidden" id="a-lat">
        <input type="hidden" id="a-lon">
        <input type="hidden" id="a-depth">
        <input type="hidden" id="dt-input">
        <div>
          <span class="section-label">現在地 緯度/経度</span>
          <div id="origin-display" class="et-origin-display"></div>
          <div class="input-row et-mt-sm">
            <input type="number" id="b-lat" placeholder="緯度 Lat" step="any" min="-90" max="90" value="35.7">
            <input type="number" id="b-lon" placeholder="経度 Lon" step="any" min="-180" max="180" value="139.7">
          </div>
        </div>
      </div>
    </div>

  </div><!-- /rw-left -->

  <!-- ── 中央マップ ─────────────────────────────────────────── -->
  <div class="rw-center">
    <div id="wavefront-map"></div>
    <div class="rw-map-overlay">
      <span class="rw-map-overlay-title">WAVEFRONT MAP</span>
      <span id="map-status" class="rw-map-status-text"></span>
    </div>
  </div>

  <!-- ── 右パネル ──────────────────────────────────────────── -->
  <div class="rw-right">
    <div class="card rw-right-usgs">
      <div class="et-card-header">
        <span class="section-label">USGS 地震リスト</span>
        <span class="card-tag" style="opacity:.5">WIP</span>
      </div>
      <div class="rw-usgs-placeholder">
        <span>🌐</span>
        <span>USGS Earthquake Feed<br>未実装</span>
      </div>
    </div>
  </div>

</div><!-- /rw-body -->

<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>

const ALL_PHASES = Object.assign({}, IASP91, IASP91_EXTRA);

// 波面描画の震相→色マップ（物理的意味を持つ色、デザイントークン外）
const WF_COLORS = {
  'P':     '#00e5ff',
  'PKPdf': '#64dfdf',
  'S':     '#ffd166',
  'SKSdf': '#f4a261',
};

// ── IASP91 双線形補間 ──────────────────────────────────────

/**
 * 走時テーブルの1深度スライスを線形補間
 * @param {Array<[number,number]>} pairs  [delta, time] ペア配列
 * @param {number}                 delta  震央距離 (°)
 * @returns {number|null}
 */
function interpDelta(pairs, delta) {
  if (!pairs || pairs.length === 0) return null;
  if (delta < pairs[0][0] || delta > pairs[pairs.length - 1][0]) return null;
  if (delta === pairs[0][0]) return pairs[0][1];
  for (let i = 0; i < pairs.length - 1; i++) {
    const [d0, t0] = pairs[i], [d1, t1] = pairs[i + 1];
    if (delta >= d0 && delta <= d1) return t0 + (delta - d0) / (d1 - d0) * (t1 - t0);
  }
  return null;
}

/**
 * 震相・震央距離・深さ → 走時(秒)  IASP91 双線形補間
 * @param {string} phase  震相名
 * @param {number} delta  震央距離 (°)
 * @param {number} depth  震源深さ (km)
 * @returns {number|null}
 */
function travelTime(phase, delta, depth) {
  const phaseData = ALL_PHASES[phase];
  if (!phaseData) return null;
  const clampedDepth = Math.max(0, Math.min(700, depth));
  const availableDepths = Object.keys(phaseData).map(Number).sort((a, b) => a - b);
  if (!availableDepths.length) return null;
  if (clampedDepth <= availableDepths[0])
    return interpDelta(phaseData[availableDepths[0]], delta);
  if (clampedDepth >= availableDepths[availableDepths.length - 1])
    return interpDelta(phaseData[availableDepths[availableDepths.length - 1]], delta);
  let lo, hi;
  for (let i = 0; i < availableDepths.length - 1; i++) {
    if (clampedDepth >= availableDepths[i] && clampedDepth <= availableDepths[i + 1]) {
      lo = availableDepths[i]; hi = availableDepths[i + 1]; break;
    }
  }
  if (lo === undefined) return null;
  const tLo = interpDelta(phaseData[lo], delta);
  const tHi = interpDelta(phaseData[hi], delta);
  if (tLo == null || tHi == null) return null;
  return tLo + (clampedDepth - lo) / (hi - lo) * (tHi - tLo);
}

/**
 * 走時の逆算: travelTime(phase, ?, depth) = T となる delta を返す
 * @param {string} phase
 * @param {number} T      秒
 * @param {number} depth  km
 * @returns {number|null}
 */
function invertTT(phase, T, depth) {
  const step = 0.5;
  let prevD = null, prevT = null;
  for (let d = 0; d <= 180; d += step) {
    const t = travelTime(phase, d, depth);
    if (t === null) { prevD = null; prevT = null; continue; }
    if (prevT !== null && T >= prevT && T <= t) {
      return prevD + (T - prevT) / (t - prevT) * step;
    }
    if (t > T + 60) break;
    prevD = d; prevT = t;
  }
  return null;
}

/**
 * 距離帯に応じた到達震相リストを返す
 * @param {number} delta  震央距離 (°)
 * @returns {{ pGroup: Array, sGroup: Array }}
 */
function getArrivingPhases(delta) {
  const pGroup = [], sGroup = [];
  if (delta <= 100)
    pGroup.push({ phase: 'P',     label: 'P',            color: 'var(--accent)', note: '' });
  else if (delta <= 140)
    pGroup.push({ phase: 'P',     label: 'Pdiff',        color: 'var(--accent)', note: '回折P波' });
  if (delta >= 114 && delta <= 180)
    pGroup.push({ phase: 'PKPdf', label: 'PKPdf (PKIKP)', color: '#64dfdf',       note: '内核通過' });
  if (delta >= 146 && delta <= 154)
    pGroup.push({ phase: 'PKPbc', label: 'PKPbc',         color: '#80ffdb',       note: 'PKP後退波コースティック' });
  if (delta >= 146 && delta <= 180)
    pGroup.push({ phase: 'PKPab', label: 'PKPab',         color: '#48cae4',       note: '外核通過(前進波)' });
  if (delta <= 138)
    sGroup.push({ phase: 'S',     label: 'S',            color: '#ffd166',       note: '' });
  if (delta >= 68 && delta <= 144)
    sGroup.push({ phase: 'SKSac', label: 'SKSac',         color: '#f4a261',       note: '外核反射SKS' });
  if (delta >= 104 && delta <= 180)
    sGroup.push({ phase: 'SKSdf', label: 'SKSdf (SKIKS)', color: '#e76f51',       note: '内核通過SKS' });
  return { pGroup, sGroup };
}

/**
 * Haversine 公式で震央距離 (°) を計算
 * @param {number} lat1  震源緯度
 * @param {number} lon1  震源経度
 * @param {number} lat2  観測点緯度
 * @param {number} lon2  観測点経度
 * @returns {number}  震央距離 (°)
 */
function haversineDeg(lat1, lon1, lat2, lon2) {
  const R2D = Math.PI / 180;
  const phi1 = lat1 * R2D, phi2 = lat2 * R2D;
  const dphi = (lat2 - lat1) * R2D, dlam = (lon2 - lon1) * R2D;
  const a = Math.sin(dphi / 2) ** 2 + Math.cos(phi1) * Math.cos(phi2) * Math.sin(dlam / 2) ** 2;
  return 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a)) / R2D;
}

/**
 * 秒数 → "Xm Ys" または "Ys" 文字列
 * @param {number} s  秒
 * @returns {string}
 */
function fmtSec(s) {
  const m = Math.floor(s / 60), sec = (s % 60).toFixed(1);
  return m > 0 ? `${m}m ${sec}s` : `${sec}s`;
}

/**
 * ISO/UTC 発生時刻文字列 → JST 表示文字列
 * @param {string|null} ot  ISO 8601 文字列
 * @returns {string}
 */
function fmtOT(ot) {
  if (!ot) return '--';
  try {
    const utcStr = ot.endsWith('Z') ? ot : ot + 'Z';
    const d = new Date(utcStr);
    if (isNaN(d)) return ot.slice(0, 19).replace('T', ' ');
    return d.toLocaleString('ja-JP', {
      timeZone: 'Asia/Tokyo',
      month: '2-digit', day: '2-digit',
      hour: '2-digit', minute: '2-digit', second: '2-digit',
    }) + ' JST';
  } catch { return ot.slice(0, 19); }
}

/**
 * UNIX ミリ秒 → datetime-local 入力値（JST ローカル時間）
 * @param {number} ms
 * @returns {string}  "YYYY-MM-DDTHH:MM:SS"
 */
function toJSTInputValue(ms) {
  const jst = new Date(ms + 9 * 3600 * 1000);
  const pad = n => String(n).padStart(2, '0');
  return `${jst.getUTCFullYear()}-${pad(jst.getUTCMonth() + 1)}-${pad(jst.getUTCDate())}` +
         `T${pad(jst.getUTCHours())}:${pad(jst.getUTCMinutes())}:${pad(jst.getUTCSeconds())}`;
}

/**
 * マグニチュード → 波面線の太さ (M3=1.0, M10=4.0)
 * @param {number|null} mag
 * @returns {number}
 */
function magToWeight(mag) {
  if (mag == null || isNaN(mag)) return 1.0;
  return Math.max(1.0, Math.min(4.0, 1.0 + (mag - 3.0) * (3.0 / 7.0)));
}

/**
 * 大圏円を日付変更線で分割したセグメント列として返す
 * @param {number} cLat    中心緯度
 * @param {number} cLon    中心経度
 * @param {number} distDeg 半径 (°)
 * @param {number} nPts    ポイント数
 * @returns {Array<Array<[number,number]>>}  セグメント配列
 */
function greatCircleSegments(cLat, cLon, distDeg, nPts = 360) {
  if (distDeg <= 0 || distDeg > 179.9) return [];
  const DEG = Math.PI / 180;
  const phi1 = cLat * DEG, d = distDeg * DEG;
  const norm = lo => ((lo % 360) + 540) % 360 - 180;
  const pts = [];
  for (let i = 0; i <= nPts; i++) {
    const az = (i / nPts) * 2 * Math.PI;
    const phi2 = Math.asin(Math.sin(phi1) * Math.cos(d) + Math.cos(phi1) * Math.sin(d) * Math.cos(az));
    const lam2 = cLon * DEG + Math.atan2(
      Math.sin(az) * Math.sin(d) * Math.cos(phi1),
      Math.cos(d) - Math.sin(phi1) * Math.sin(phi2)
    );
    pts.push([phi2 / DEG, norm(lam2 / DEG)]);
  }
  const segs = [];
  let seg = [pts[0]];
  for (let i = 1; i < pts.length; i++) {
    const [la, lo] = pts[i], [pla, plo] = pts[i - 1];
    const diff = lo - plo;
    if (Math.abs(diff) > 180) {
      const exitLon = diff < 0 ? 180 : -180, enterLon = diff < 0 ? -180 : 180;
      const lo_unw = lo + (diff < 0 ? 360 : -360);
      const t = (exitLon - plo) / (lo_unw - plo);
      const crossLat = pla + t * (la - pla);
      seg.push([crossLat, exitLon]);
      if (seg.length >= 2) segs.push(seg);
      seg = [[crossLat, enterLon], [la, lo]];
    } else {
      seg.push([la, lo]);
    }
  }
  if (seg.length >= 2) segs.push(seg);
  return segs;
}

/**
 * リプレイ状態から現在の仮想時刻を返す
 * @param {{ active:boolean, nowMs:number }} replay
 * @returns {number}  UNIX ミリ秒
 */
function getVirtualNow(replay) {
  return replay.active ? replay.nowMs : Date.now();
}

/**
 * Early-est QuakeML XML テキストを解析してイベント配列を返す
 * @param {string} xmlStr
 * @returns {Array<{ lat, lon, depth, mag, magType, mags, ot, region, evid }>}
 */
function parseEarthquakeXML(xmlStr) {
  const parser = new DOMParser();
  const doc = parser.parseFromString(xmlStr, 'application/xml');
  const events = [];
  const getByLocal = (el, localName) => {
    if (!el) return null;
    for (const n of el.getElementsByTagName('*')) {
      if (n.localName === localName) return n;
    }
    return null;
  };
  const txtLocal = (el, localName) => {
    const n = getByLocal(el, localName);
    return n ? n.textContent.trim() : null;
  };
  const getAll = (el, localName) => {
    const result = [];
    for (const n of el.getElementsByTagName('*')) {
      if (n.localName === localName) result.push(n);
    }
    return result;
  };
  const MAG_PRIORITY = ['Mwpd', 'Mwp', 'mb', 'ML', 'Mw', 'M'];
  const magByID = {};
  getAll(doc, 'magnitude').forEach(m => {
    const pid = m.getAttribute('publicID') || '';
    if (!pid) return;
    const magEl = getByLocal(m, 'mag');
    if (!magEl) return;
    const valEl = getByLocal(magEl, 'value');
    if (!valEl) return;
    const magVal = parseFloat(valEl.textContent);
    if (isNaN(magVal)) return;
    magByID[pid] = { mag: magVal, magType: txtLocal(m, 'type') || 'M' };
  });
  getAll(doc, 'event').forEach(ev => {
    const evPublicID = ev.getAttribute('publicID') || '';
    const magsMap = {};
    getAll(ev, 'magnitude').forEach(m => {
      const magEl = getByLocal(m, 'mag');
      if (!magEl) return;
      const valEl = getByLocal(magEl, 'value');
      if (!valEl) return;
      const magVal = parseFloat(valEl.textContent);
      if (isNaN(magVal)) return;
      const magType = txtLocal(m, 'type') || 'M';
      if (!(magType in magsMap)) magsMap[magType] = magVal;
    });
    const mags = MAG_PRIORITY.filter(t => t in magsMap).map(t => ({ type: t, val: magsMap[t] }));
    Object.entries(magsMap).forEach(([t, v]) => {
      if (!MAG_PRIORITY.includes(t)) mags.push({ type: t, val: v });
    });
    let mag = null, magType = 'M';
    const prefMagID = txtLocal(ev, 'preferredMagnitudeID');
    if (prefMagID) {
      if (magByID[prefMagID]) { mag = magByID[prefMagID].mag; magType = magByID[prefMagID].magType; }
      if (mag === null) {
        for (const [k, v] of Object.entries(magByID)) {
          if (k.endsWith(prefMagID) || prefMagID.endsWith(k)) { mag = v.mag; magType = v.magType; break; }
        }
      }
      if (mag === null) {
        const tm = prefMagID.match(/\/magnitude\/([^/]+)$/);
        if (tm && tm[1] in magsMap) { mag = magsMap[tm[1]]; magType = tm[1]; }
      }
    }
    if (mag === null && mags.length > 0) { mag = mags[0].val; magType = mags[0].type; }
    const origins = getAll(ev, 'origin');
    if (!origins.length) return;
    const prefOriginID = txtLocal(ev, 'preferredOriginID');
    let origin = origins[0];
    if (prefOriginID) {
      const matched = origins.find(o => {
        const pid = o.getAttribute('publicID') || '';
        return pid === prefOriginID || pid.endsWith(prefOriginID) || prefOriginID.endsWith(pid);
      });
      if (matched) origin = matched;
    }
    const getCoordValue = (tagName) => {
      const coordEl = getByLocal(origin, tagName);
      if (!coordEl) return NaN;
      const valEl = getByLocal(coordEl, 'value');
      return valEl ? parseFloat(valEl.textContent) : NaN;
    };
    const lat = getCoordValue('latitude'), lon = getCoordValue('longitude');
    const depthEl = getByLocal(origin, 'depth');
    let depth = 0;
    if (depthEl) {
      const valEl = getByLocal(depthEl, 'value');
      if (valEl) depth = parseFloat(valEl.textContent) / 1000;
    }
    const timeEl = getByLocal(origin, 'time');
    let ot = null;
    if (timeEl) {
      const valEl = getByLocal(timeEl, 'value');
      if (valEl) ot = valEl.textContent.trim();
    }
    const region = txtLocal(origin, 'region') || '';
    if (!isNaN(lat) && !isNaN(lon)) {
      events.push({ lat, lon, depth: isNaN(depth) ? 0 : depth, mag: isNaN(mag) ? null : mag, magType, mags, ot, region, evid: evPublicID });
    }
  });
  if (events.length > 0) return events;
  // フォールバック
  doc.querySelectorAll('item, feature, hypo, earthquake').forEach(el => {
    const lat = parseFloat(el.getAttribute('lat') || '');
    const lon = parseFloat(el.getAttribute('lon') || '');
    if (!isNaN(lat) && !isNaN(lon)) {
      events.push({ lat, lon, depth: parseFloat(el.getAttribute('depth') || '0'), mag: parseFloat(el.getAttribute('mag') || '') || null, magType: 'M', ot: null, region: '', evid: '' });
    }
  });
  return events;
}

/**
 * マグニチュード色コードを返す（動的カラーマップ値）
 * @param {number|null} mag
 * @returns {string}  CSS color
 */
function magToColor(mag) {
  if (mag == null) return 'var(--dim)';
  if (mag >= 7) return '#ff6b35';
  if (mag >= 6) return '#ffd166';
  return 'var(--accent)';
}

/**
 * イベントのステータスラベル文字列を生成（純粋関数）
 * @param {Object}  ev     イベントオブジェクト
 * @param {boolean} flash  新イベントかどうか
 * @returns {string}
 */
function buildStatusLabel(ev, flash) {
  const magsStr = (ev.mags && ev.mags.length > 1)
    ? ev.mags.map(m => `${m.type}${m.val.toFixed(1)}`).join(' / ')
    : (ev.mag != null ? `${ev.magType || 'M'}${ev.mag.toFixed(1)}` : '');
  return flash
    ? `🆕 新イベント自動適用: ${fmtOT(ev.ot)}  ${magsStr}`
    : `✓ 自動適用中: ${fmtOT(ev.ot)}  ${magsStr}`;
}

/**
 * プロキシ経由で Discord に地震イベントを通知する
 * webhook URL は config/db_config.ini からサーバー側で読む。
 * @param {Object} ev  イベントオブジェクト
 * @returns {Promise<boolean>}  成功なら true
 */
async function sendDiscordNotification(ev) {
  const body = {
    lat:     ev.lat,
    lon:     ev.lon,
    depth:   ev.depth,
    mag:     ev.mag,
    magType: ev.magType,
    mags:    ev.mags,
    ot:      fmtOT(ev.ot),
    region:  ev.region,
  };
  const res = await fetch('http://localhost:8765/api/notify/quake', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  return res.ok;
}

/**
 * 単一のカウントダウンセルを更新する
 * @param {HTMLElement} el
 * @param {number}      arrMs  到着時刻 UNIX ミリ秒
 * @param {number}      nowMs  現在時刻 UNIX ミリ秒（デフォルト: Date.now()）
 */
function updateCountdown(el, arrMs, nowMs = Date.now()) {
  const remain = (arrMs - nowMs) / 1000;
  if (remain > 0) {
    el.className = 'arr-cd waiting';
    const m = Math.floor(remain / 60), s = Math.floor(remain % 60);
    el.textContent = m > 0 ? `あと ${m}m ${String(s).padStart(2, '0')}s` : `あと ${s}s`;
  } else {
    el.className = 'arr-cd arrived';
    const past = Math.floor(-remain);
    const m = Math.floor(past / 60), s = past % 60;
    el.textContent = m > 0 ? `+${m}m ${String(s).padStart(2, '0')}s` : `+${s}s`;
  }
}

/**
 * 到着震相リストを描画する（リストを全書き換え）
 * @param {HTMLElement}   listEl        #arrival-list
 * @param {number}        delta         震央距離 (°)
 * @param {number}        depth         震源深さ (km)
 * @param {number|null}   originTimeMs  発生時刻 UNIX ミリ秒
 */
function renderArrivals(listEl, delta, depth, originTimeMs) {
  const ph = listEl.querySelector('#arrival-placeholder');
  if (ph) ph.remove();
  listEl.querySelectorAll('.arr-wrap').forEach(el => el.remove());

  const { pGroup, sGroup } = getArrivingPhases(delta);

  for (const { groupLabel, entries } of [
    { groupLabel: 'P GROUP', entries: pGroup },
    { groupLabel: 'S GROUP', entries: sGroup },
  ]) {
    const hdr = document.createElement('div');
    hdr.className = 'arr-wrap arr-section-hdr';
    hdr.textContent = '─ ' + groupLabel + ' ─';
    listEl.appendChild(hdr);

    if (entries.length === 0) {
      const none = document.createElement('div');
      none.className = 'arr-wrap arr-none';
      none.textContent = '(この距離帯では到達しない)';
      listEl.appendChild(none);
      continue;
    }

    for (const entry of entries) {
      const tt    = travelTime(entry.phase, delta, depth);
      const arrMs = (tt != null && originTimeMs) ? originTimeMs + tt * 1000 : null;

      const wrap = document.createElement('div');
      wrap.className = 'arr-wrap';

      const row = document.createElement('div');
      row.className = 'arrival-row';
      // --et-phase-color を設定 → CSS が border-left と .arr-phase に適用
      row.style.setProperty('--et-phase-color', entry.color);

      const phEl = document.createElement('div');
      phEl.className = 'arr-phase';
      phEl.textContent = entry.label;

      const ttEl = document.createElement('div');
      ttEl.className = 'arr-tt';
      ttEl.textContent = tt != null ? fmtSec(tt) + '  走時' : '範囲外';

      const absEl = document.createElement('div');
      absEl.className = 'arr-abs';
      if (arrMs) {
        absEl.textContent = new Date(arrMs).toLocaleString('ja-JP', {
          timeZone: 'Asia/Tokyo',
          month: '2-digit', day: '2-digit',
          hour: '2-digit', minute: '2-digit', second: '2-digit',
        });
      } else {
        absEl.textContent = tt != null ? '(発生時刻未設定)' : '--';
        absEl.className += ' ' + (tt != null ? '' : '');  // dim は CSS で
      }

      const cdEl = document.createElement('div');
      cdEl.className = 'arr-cd';
      if (arrMs != null) {
        cdEl.dataset.arrivalMs = String(arrMs);
        updateCountdown(cdEl, arrMs);
      } else {
        cdEl.textContent = '--';
      }

      row.append(phEl, ttEl, absEl, cdEl);
      wrap.appendChild(row);

      if (entry.note) {
        const noteEl = document.createElement('div');
        noteEl.className = 'arr-note';
        noteEl.textContent = '└ ' + entry.note;
        wrap.appendChild(noteEl);
      }
      listEl.appendChild(wrap);
    }
  }
}

/**
 * 震源表示テキストを更新する
 * @param {HTMLElement}  el           #origin-display
 * @param {number|null}  originTimeMs  UNIX ミリ秒
 */
function updateOriginDisplay(el, originTimeMs) {
  if (!el || !originTimeMs) return;
  el.textContent = new Date(originTimeMs).toLocaleString('ja-JP', {
    timeZone: 'Asia/Tokyo',
    year: 'numeric', month: '2-digit', day: '2-digit',

}

/**
 * XMLイベント行 DOM 要素を生成する（副作用なし: DOM を生成して返すだけ）
 * @param {Object}   ev            イベント
 * @param {boolean}  isSelected
 * @param {boolean}  flashNew
 * @param {Function} onSelect      クリック時コールバック (ev) => void
 * @returns {HTMLElement}
 */
function buildEventRowEl(ev, isSelected, flashNew, onSelect) {
  const mainMag  = ev.mag, mainType = ev.magType;
  const magColor = magToColor(mainMag);
  const latStr   = (ev.lat >= 0 ? 'N' : 'S') + Math.abs(ev.lat).toFixed(3) + '°';
  const lonStr   = (ev.lon >= 0 ? 'E' : 'W') + Math.abs(ev.lon).toFixed(3) + '°';
  const mainMagStr = mainMag != null ? `${mainType}${mainMag.toFixed(1)}` : 'M?';
  const magsArr  = ev.mags && ev.mags.length > 0 ? ev.mags : (mainMag != null ? [{ type: mainType, val: mainMag }] : []);

  const row = document.createElement('div');
  row.className = 'et-event-row' + (isSelected ? ' et-selected' : '');
  row.title = 'クリックで震源に適用';
  if (isSelected && flashNew) row.classList.add('et-flash');

  // 1行目: マグニチュード / 時刻 / 地域
  const top = document.createElement('div');
  top.className = 'et-event-top';

  const magEl = document.createElement('span');
  magEl.className = 'et-event-mag';
  magEl.style.setProperty('--et-mag-color', magColor);
  magEl.textContent = mainMagStr;

  const timeEl = document.createElement('span');
  timeEl.className = 'et-event-time';
  timeEl.textContent = fmtOT(ev.ot);

  top.appendChild(magEl);
  top.appendChild(timeEl);
  if (ev.region) {
    const regionEl = document.createElement('span');
    regionEl.className = 'et-event-region';
    regionEl.textContent = ev.region;
    top.appendChild(regionEl);
  }
  row.appendChild(top);

  // マグニチュードバッジ群（複数ある場合のみ）
  if (magsArr.length > 1) {
    const badges = document.createElement('div');
    badges.className = 'et-mag-badges';
    magsArr.forEach(m => {
      const c = m.type === 'Mwpd' ? '#e879f9'
              : m.type === 'Mwp'  ? '#a78bfa'
              : m.type === 'mb'   ? '#60a5fa'
              : 'var(--accent)';
      const badge = document.createElement('span');
      badge.className = 'et-mag-badge' + (m.type === mainType ? ' et-mag-badge--main' : '');
      badge.style.setProperty('--et-badge-color', c);
      badge.textContent = `${m.type}\u00A0${m.val.toFixed(1)}`;
      badges.appendChild(badge);
    });
    row.appendChild(badges);
  }

  // 座標・深さ
  const meta = document.createElement('div');
  meta.className = 'et-event-meta';
  const coords = document.createElement('span');
  coords.className = 'et-event-meta-item';
  coords.textContent = `${latStr}\u00A0${lonStr}`;
  const depEl = document.createElement('span');
  depEl.className = 'et-event-meta-item';
  depEl.textContent = `深さ ${ev.depth.toFixed(0)} km`;
  meta.appendChild(coords);
  meta.appendChild(depEl);
  row.appendChild(meta);

  // ホバー / クリック
  row.addEventListener('mouseenter', () => {
    row.style.borderColor = 'var(--accent)';
    if (!isSelected) row.style.background = 'rgba(0,212,255,.04)';
  });
  row.addEventListener('mouseleave', () => {
    row.style.borderColor = isSelected ? 'var(--accent)' : '';
    row.style.background  = isSelected ? 'rgba(0,212,255,.07)' : '';
  });
  row.addEventListener('click', () => onSelect(ev));

  return row;
}

/**
 * XMLイベントリストを描画する
 * @param {HTMLElement}   listEl
 * @param {HTMLElement}   statusEl
 * @param {Array}         events
 * @param {string|null}   selectedEvid
 * @param {boolean}       flashNew
 * @param {Function}      onSelect  (ev) => void
 */
function renderXMLEvents(listEl, statusEl, events, selectedEvid, flashNew, onSelect) {
  listEl.innerHTML = '';
  if (!events.length) {
    listEl.innerHTML = '<div class="et-event-placeholder">イベントが見つかりませんでした</div>';
    statusEl.textContent = '';
    return;
  }
  events.forEach(ev => {
    const isSelected = !!(ev.evid && ev.evid === selectedEvid);
    const rowEl = buildEventRowEl(ev, isSelected, flashNew, onSelect);
    if (isSelected && flashNew) {
      // フラッシュ後に通常の選択スタイルに戻す
      setTimeout(() => rowEl.classList.remove('et-flash'), 600);
    }
    listEl.appendChild(rowEl);
  });
  statusEl.textContent = `${events.length} 件取得 — クリックで適用`;
}

// ── MapLibre GL JS ウェーブフロントマップ ─────────────────────

const CARTO_DARK_STYLE = {
  version: 8,
  sources: { carto: {
    type: 'raster',
    tiles: ['https://a.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png'],
    tileSize: 256,
    attribution: '© <a href="https://openstreetmap.org">OSM</a> © <a href="https://carto.com">CARTO</a>',
  }},
  layers: [{ id: 'carto', type: 'raster', source: 'carto' }],
};

/**
 * MapLibre GL JS ウェーブフロントマップを初期化して返す
 * @param {string} containerId  マップコンテナの id
 * @returns {maplibregl.Map}
 */
function initWavefrontMap(containerId) {
  const mapInst = new maplibregl.Map({
    container: containerId,
    style: CARTO_DARK_STYLE,
    center: [140, 10],
    zoom: 2,
    minZoom: 1,
  });
  mapInst.addControl(new maplibregl.NavigationControl(), 'top-right');
  return mapInst;
}

// ウェーブフロント用ソース・レイヤーIDのグローバルカウンタ（重複回避）
let _wfLayerSeq = 0;

/**
 * 単一震相の波面ラインを GeoJSON source/layer で描画する（既存を先に削除）
 * @param {maplibregl.Map} mapInst
 * @param {Object}         layersObj  震相名→{sourceId, layerId}配列のキャッシュ
 * @param {string}         phase
 * @param {number|null}    delta
 * @param {number}         cLat
 * @param {number}         cLon
 * @param {number}         weight  線の太さ
 */
function drawWavefront(mapInst, layersObj, phase, delta, cLat, cLon, weight) {
  // 既存レイヤー・ソースを削除
  if (layersObj[phase]) {
    for (const { sourceId, layerId } of layersObj[phase]) {
      if (mapInst.getLayer(layerId))  mapInst.removeLayer(layerId);
      if (mapInst.getSource(sourceId)) mapInst.removeSource(sourceId);
    }
    layersObj[phase] = [];
  }
  if (delta === null || delta <= 0) return;

  const segs = greatCircleSegments(cLat, cLon, delta);
  const color   = WF_COLORS[phase] || '#fff';
  const opacity = Math.min(0.95, 0.55 + weight * 0.06);
  const entries = [];

  for (const pts of segs) {
    for (const shift of [0, 360, -360]) {
      const coords = (shift === 0 ? pts : pts.map(([la, lo]) => [la, lo + shift]))
        .map(([la, lo]) => [lo, la]);  // [lat,lon] → [lon,lat]

      const sourceId = `wf-src-${_wfLayerSeq}`;
      const layerId  = `wf-lyr-${_wfLayerSeq}`;
      _wfLayerSeq++;

      mapInst.addSource(sourceId, {
        type: 'geojson',
        data: { type: 'Feature', geometry: { type: 'LineString', coordinates: coords } },
      });
      mapInst.addLayer({
        id: layerId, type: 'line', source: sourceId,
        paint: {
          'line-color':   color,
          'line-width':   weight,
          'line-opacity': opacity,
        },
      });
      entries.push({ sourceId, layerId });
    }
  }
  layersObj[phase] = entries;
}

/**
 * 全震源の波面レイヤーと震源マーカーを地図から削除し wfSources を空にする
 * @param {maplibregl.Map} mapInst
 * @param {Array}          sources  wfState.sources
 */
function clearAllWavefronts(mapInst, sources) {
  for (const src of sources) {
    for (const entries of Object.values(src.layers)) {
      for (const { sourceId, layerId } of entries) {
        if (mapInst.getLayer(layerId))   mapInst.removeLayer(layerId);
        if (mapInst.getSource(sourceId)) mapInst.removeSource(sourceId);
      }
    }
    if (src.marker) src.marker.remove();
  }
  sources.length = 0;  // 配列を破壊的に空にする（参照を維持するため）
}

/**
 * 全震源の波面を現在の仮想時刻に基づいて更新する
 * @param {maplibregl.Map} mapInst
 * @param {Array}          sources   wfState.sources
 * @param {Object}         replay    { active, nowMs, speed }
 * @param {HTMLElement}    statusEl  #map-status
 */
function updateAllWavefronts(mapInst, sources, replay, statusEl) {
  if (!mapInst || !mapInst.isStyleLoaded() || sources.length === 0) return;
  const now = getVirtualNow(replay);
  for (const src of sources) {
    const elapsed = (now - src.originTimeMs) / 1000;
    const w = magToWeight(src.mag);
    if (elapsed <= 0) {
      // 全波面を削除
      for (const entries of Object.values(src.layers)) {
        for (const { sourceId, layerId } of entries) {
          if (mapInst.getLayer(layerId))   mapInst.removeLayer(layerId);
          if (mapInst.getSource(sourceId)) mapInst.removeSource(sourceId);
        }
      }
      src.layers = {};
      continue;
    }
    drawWavefront(mapInst, src.layers, 'P',     invertTT('P',     elapsed, src.depth), src.lat, src.lon, w);
    drawWavefront(mapInst, src.layers, 'PKPdf', invertTT('PKPdf', elapsed, src.depth), src.lat, src.lon, w * 0.7);
    drawWavefront(mapInst, src.layers, 'S',     invertTT('S',     elapsed, src.depth), src.lat, src.lon, w);
    drawWavefront(mapInst, src.layers, 'SKSdf', invertTT('SKSdf', elapsed, src.depth), src.lat, src.lon, w * 0.7);
  }
  const active = sources.filter(s => {
    const el = (getVirtualNow(replay) - s.originTimeMs) / 1000;
    return el > 0 && ['P', 'S'].some(ph => (s.layers[ph] || []).length > 0);
  });
  updateMapStatus(statusEl,
    active.length > 0
      ? `${sources.length}震源描画中 — 伝播中: ${active.length}件`
      : `${sources.length}震源 — 全波面通過済み`
  );
}

/**
 * 震源マーカー（×印アイコン）を作成して返す
 * @param {number}      lat
 * @param {number}      lon
 * @param {number|null} mag
 * @param {string}      label  ポップアップテキスト
 * @returns {maplibregl.Marker}
 */
function makeEpicenterMarker(lat, lon, mag, label) {
  const s = Math.max(12, Math.min(24, 10 + (mag || 4) * 1.2));
  const el = document.createElement('div');
  el.innerHTML =
    `<svg width="${s}" height="${s}" viewBox="-${s/2} -${s/2} ${s} ${s}" xmlns="http://www.w3.org/2000/svg">`
    + `<line x1="-${s*0.38}" y1="-${s*0.38}" x2="${s*0.38}" y2="${s*0.38}" stroke="#ff6b35" stroke-width="2" stroke-linecap="round"/>`
    + `<line x1="${s*0.38}" y1="-${s*0.38}" x2="-${s*0.38}" y2="${s*0.38}" stroke="#ff6b35" stroke-width="2" stroke-linecap="round"/>`
    + '</svg>';
  el.style.cssText = 'cursor:pointer;';
  const popup = new maplibregl.Popup({ closeButton: false })
    .setHTML(label);
  return new maplibregl.Marker({ element: el, anchor: 'center' })
    .setLngLat([lon, lat])
    .setPopup(popup);
}

/**
 * 現在地マーカーを更新する（前のマーカーを削除してから追加）
 * @param {maplibregl.Map} mapInst
 * @param {Object}         wfState  { stationMarker } ← 破壊的更新
 * @param {number}         bLat
 * @param {number}         bLon
 */
function updateStationMarker(mapInst, wfState, bLat, bLon) {
  if (!mapInst || isNaN(bLat) || isNaN(bLon)) return;
  if (wfState.stationMarker) wfState.stationMarker.remove();
  const el = document.createElement('div');
  el.style.cssText =
    'width:12px;height:12px;border-radius:50%;' +
    'background:#0a0c0f;border:2px solid #00d4ff;box-sizing:border-box;';
  const popup = new maplibregl.Popup({ closeButton: false }).setHTML('現在地');
  wfState.stationMarker = new maplibregl.Marker({ element: el, anchor: 'center' })
    .setLngLat([bLon, bLat])
    .setPopup(popup)
    .addTo(mapInst);
}

// ============================================================
// ③ 統合用エントリ関数
// ============================================================

/**
 * イベント選択を適用する（state と DOM を一括更新）
 * 震源座標・深さ・発生時刻を state に書き込み、到着表示と地図を更新する。
 *
 * @param {Object}        ev      XMLパースされたイベントオブジェクト
 * @param {Object}        state   アプリ状態（破壊的更新あり）
 * @param {Object}        els     DOM参照オブジェクト
 * @param {maplibregl.Map} mapInst MapLibreマップ
 * @param {boolean}       flash   新イベント通知フラグ
 */
function onEventSelect(ev, state, els, mapInst, flash) {
  state.currentEvid = ev.evid;

  els.aLat.value   = ev.lat;
  els.aLon.value   = ev.lon;
  els.aDepth.value = ev.depth.toFixed(1);

  if (ev.ot) {
    try {
      const utcStr = ev.ot.endsWith('Z') ? ev.ot : ev.ot + 'Z';
      const d = new Date(utcStr);
      if (!isNaN(d)) {
        state.originTimeMs   = d.getTime();
        els.dtInput.value    = toJSTInputValue(state.originTimeMs);
        updateOriginDisplay(els.originDisplay, state.originTimeMs);
      }
    } catch {}
  }

  // 到着再計算
  recalcArrivals(state, els, mapInst);

  els.xmlStatus.textContent = buildStatusLabel(ev, flash);

  // Discord 通知（新イベント検出時のみ）
  if (flash) {
    sendDiscordNotification(ev)
      .then(ok => {
        if (ok) els.xmlStatus.textContent += ' — Discord通知送信';
        else    els.xmlStatus.textContent += ' — Discord通知失敗';
      })
      .catch(() => { els.xmlStatus.textContent += ' — Discord通知エラー'; });
  }
}

/**
 * 到着時刻リストと地図マーカーを再計算して描画する
 * @param {Object}  state
 * @param {Object}  els
 * @param {maplibregl.Map}   mapInst
 */
function recalcArrivals(state, els, mapInst) {
  const aLat  = parseFloat(els.aLat.value);
  const aLon  = parseFloat(els.aLon.value);
  const depth = parseFloat(els.aDepth.value) || 0;
  const bLat  = parseFloat(els.bLat.value);
  const bLon  = parseFloat(els.bLon.value);
  if ([aLat, aLon, bLat, bLon].some(isNaN)) return;
  const deg = haversineDeg(aLat, aLon, bLat, bLon);
  renderArrivals(els.arrivalList, deg, depth, state.originTimeMs);
  if (mapInst) updateStationMarker(mapInst, state.wf, bLat, bLon);
}

/**
 * XMLテキストを受け取ってパース・描画・波面更新を一括実行する
 * @param {string}  text
 * @param {Object}  state
 * @param {Object}  els
 * @param {maplibregl.Map}   mapInst
 */
function onXMLText(text, state, els, mapInst) {
  try {
    const events = parseEarthquakeXML(text);
    if (!events.length) {
      renderXMLEvents(els.xmlEventList, els.xmlStatus, events, null, false, () => {});
      if (mapInst) clearAllWavefronts(mapInst, state.wf.sources);
      return;
    }
    state.allXMLEvents = events;

    const prevEvid = state.currentEvid;
    const still    = prevEvid ? events.find(e => e.evid === prevEvid) : null;
    const toSelect = still || events[0];
    const isNew    = !still && prevEvid !== null;

    renderXMLEvents(
      els.xmlEventList, els.xmlStatus, events, toSelect.evid, isNew,
      (ev) => onEventSelect(ev, state, els, mapInst, false)
    );
    onEventSelect(toSelect, state, els, mapInst, isNew);

    // 全件を波面ソースとして再構築
    if (mapInst) rebuildWfSources(mapInst, state, els, events);
  } catch (e) {
    els.xmlStatus.textContent = '解析エラー: ' + e.message;
  }
}

/**
 * 全XMLイベントを wfSources に変換して波面を再描画する
 * @param {maplibregl.Map}   mapInst
 * @param {Object}  state
 * @param {Object}  els
 * @param {Array}   events
 */
function rebuildWfSources(mapInst, state, els, events) {
  clearAllWavefronts(mapInst, state.wf.sources);
  let earliestOT = Infinity;

  for (const ev of events) {
    if (isNaN(ev.lat) || isNaN(ev.lon) || !ev.ot) continue;
    const utcStr = ev.ot.endsWith('Z') ? ev.ot : ev.ot + 'Z';
    const ot = new Date(utcStr);
    if (isNaN(ot)) continue;
    if (ot.getTime() < earliestOT) earliestOT = ot.getTime();

    const magStr = ev.mag != null ? `${ev.magType || 'M'}${ev.mag.toFixed(1)}` : '';
    const src = {
      lat: ev.lat, lon: ev.lon,
      depth: ev.depth || 0,
      originTimeMs: ot.getTime(),
      mag: ev.mag,
      layers: {},
      marker: makeEpicenterMarker(ev.lat, ev.lon, ev.mag, `${magStr} ${fmtOT(ev.ot)}`).addTo(mapInst),
    };
    state.wf.sources.push(src);
  }

  // 1時間以上前の地震はリプレイモードで発震時刻から再生
  if (earliestOT < Date.now() - 3600 * 1000) {
    state.replay.active = true;
    state.replay.nowMs  = earliestOT;
    updateMapStatus(els.mapStatus,
      `▶ REPLAY ×${state.replay.speed} — ${new Date(earliestOT).toUTCString()}`
    );
  } else {
    state.replay.active = false;
  }

  // 現在地マーカーを最新に
  const bLat = parseFloat(els.bLat.value);
  const bLon = parseFloat(els.bLon.value);
  updateStationMarker(mapInst, state.wf, bLat, bLon);
}

/**
 * URL から XML を取得して onXMLText に渡す（複数プロキシをフォールバック）
 * @param {string}  url
 * @param {Object}  state
 * @param {Object}  els
 * @param {maplibregl.Map}   mapInst
 */
async function fetchXMLFromURL(url, state, els, mapInst) {
  if (!url) return;
  const candidates = [
    { label: 'ローカルプロキシ(8765)', url: `http://localhost:8765/proxy?url=${encodeURIComponent(url)}` },
    { label: '外部からの接続(8765)', url: `http://100.126.68.79:8765/proxy?url=${encodeURIComponent(url)}` },
    { label: 'corsproxy.io',           url: `https://corsproxy.io/?${encodeURIComponent(url)}` },
    { label: 'allorigins',             url: `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}` },
    { label: 'codetabs',               url: `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}` },
  ];
  for (const c of candidates) {
    els.xmlStatus.textContent = `取得中... (${c.label})`;
    try {
      const res = await fetch(c.url);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const text = await res.text();
      if (!text || !text.includes('<')) throw new Error('空またはXML形式でない');
      onXMLText(text, state, els, mapInst);
      els.xmlStatus.textContent = `✓ ${c.label}で取得 [${new Date().toLocaleTimeString('ja-JP', { timeZone: 'Asia/Tokyo' })}]`;
      return;
    } catch (e) {
      els.xmlStatus.textContent = `${c.label} 失敗 (${e.message})`;
      await new Promise(r => setTimeout(r, 300));
    }
  }
  els.xmlStatus.innerHTML =
    `<span style="color:var(--accent2)">全プロキシ失敗</span>` +
    ` — <b>python3 quakeview_proxy.py</b> を起動中ですか？`;
}

/**
 * Elapsed Timer 全体を初期化する
 * マップ・イベントリスナー・DOM参照をセットアップして tick を返す。
 * setInterval の呼び出しは呼び出し元に委ねる。
 *
 * @returns {{ tick: () => void, fetch: () => Promise<void> }}
 */
function initElapsedTimer() {
  // ── 状態オブジェクト ──────────────────────────────────────
  const state = {
    originTimeMs:  null,   // UNIX ミリ秒
    currentEvid:   null,
    allXMLEvents:  [],
    replay: {
      active: false,
      nowMs:  0,
      speed:  1,
    },
    wf: {
      sources:       [],   // { lat, lon, depth, originTimeMs, mag, layers, marker }
      stationMarker: null,
    },
  };

  // ── DOM 参照 ─────────────────────────────────────────────
  const els = {
    originDisplay: document.getElementById('origin-display'),
    dtInput:       document.getElementById('dt-input'),
    aLat:          document.getElementById('a-lat'),
    aLon:          document.getElementById('a-lon'),
    aDepth:        document.getElementById('a-depth'),
    bLat:          document.getElementById('b-lat'),
    bLon:          document.getElementById('b-lon'),
    arrivalList:   document.getElementById('arrival-list'),
    xmlEventList:  document.getElementById('xml-event-list'),
    xmlStatus:     document.getElementById('xml-status'),
    xmlUrl:        document.getElementById('xml-url'),
    xmlFileInput:  document.getElementById('xml-file-input'),
    btnFetchXml:  document.getElementById('btn-fetch-xml'),
    btnAutoFetch: document.getElementById('btn-xml-autofetch'),
    mapStatus:    document.getElementById('map-status'),
  };

  // ── MapLibre マップ（DOM が準備できてから初期化） ─────────
  let mapInst = null;
  setTimeout(() => {
    mapInst = initWavefrontMap('wavefront-map');
  }, 100);

  // ── 数値入力の focus ハイライト ──────────────────────────
  ['a-lat', 'a-lon', 'a-depth', 'b-lat', 'b-lon'].forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    el.addEventListener('focus', () => el.style.borderColor = 'var(--accent)');
    el.addEventListener('blur',  () => el.style.borderColor = '');
  });

  // ── 現在地変更で自動再計算 ──────────────────────────────
  ['b-lat', 'b-lon'].forEach(id => {
    const el = document.getElementById(id);
    el.addEventListener('keydown', e => { if (e.key === 'Enter') recalcArrivals(state, els, mapInst); });
    el.addEventListener('change', () => {
      if (![parseFloat(els.aLat.value), parseFloat(els.aLon.value),
            parseFloat(els.bLat.value), parseFloat(els.bLon.value)].some(isNaN)) {
        recalcArrivals(state, els, mapInst);
      }
    });
  });

  // ── XML FETCH URL ────────────────────────────────────────
  els.btnFetchXml.addEventListener('click', () => {
    fetchXMLFromURL(els.xmlUrl.value.trim(), state, els, mapInst);
  });

  // ── XML ファイル読み込み ──────────────────────────────────
  els.xmlFileInput.addEventListener('change', e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => onXMLText(ev.target.result, state, els, mapInst);
    reader.onerror = () => { els.xmlStatus.textContent = 'ファイル読み込みエラー'; };
    reader.readAsText(file, 'UTF-8');
    e.target.value = '';
  });

  // ── AUTO フェッチ ─────────────────────────────────────────
  let xmlAutoTimer = null;
  let xmlAutoActive = false;

  els.btnAutoFetch.addEventListener('click', () => {
    xmlAutoActive = !xmlAutoActive;
    setAutoFetchBtn(els.btnAutoFetch, xmlAutoActive);
    if (xmlAutoActive) {
      fetchXMLFromURL(els.xmlUrl.value.trim(), state, els, mapInst);
      xmlAutoTimer = setInterval(() => {
        fetchXMLFromURL(els.xmlUrl.value.trim(), state, els, mapInst);
      }, 10000);
    } else {
      clearInterval(xmlAutoTimer);
    }
  });

  // ── Tick 関数（1秒ごとに呼ぶ） ───────────────────────────
  function tick() {
    // リプレイ時刻を進める
    if (state.replay.active) state.replay.nowMs += 1000 * state.replay.speed;
    // カウントダウン更新
    const nowMs = getVirtualNow(state.replay);
    document.querySelectorAll('.arr-cd[data-arrival-ms]').forEach(el => {
      updateCountdown(el, +el.dataset.arrivalMs, nowMs);
    });
    // 波面更新
    if (mapInst) updateAllWavefronts(mapInst, state.wf.sources, state.replay, els.mapStatus);
  }

  // ── fetch ラッパー（外部から呼べる形に） ─────────────────
  function fetch_() {
    return fetchXMLFromURL(els.xmlUrl.value.trim(), state, els, mapInst);
  }

  return { tick, fetch: fetch_ };
}

// ============================================================
// スタンドアロン実行ブロック
// ─────────────────────────────────────────────────────────────
// QuakeView_personal に統合する場合はこのブロックを削除し、
// 既存の更新ループから et.tick() を呼び出すこと。
//
// ── 統合例 ────────────────────────────────────────────────
//   const et = initElapsedTimer();
//
//   function existingMainLoop() {   // ← 既存のループに追記
//     et.tick();
//   }
//   et.fetch();  // 初回フェッチ
// ============================================================
const et = initElapsedTimer();

// 自動フェッチ開始（ページ起動時: 800ms 後に MapLibre マップが確実に初期化済み）
setTimeout(() => {
  et.fetch();
  // AUTO ボタンを ON 状態にする
  const btn = document.getElementById('btn-xml-autofetch');
  btn.click();  // click イベントで xmlAutoActive をトグル→setAutoFetchBtn も実行
}, 800);

// 1秒ループ（tick のみ; fetch は AUTO ボタンの setInterval が担当）
setInterval(et.tick, 1000);
</script>
