// ============================================================
// 定数
// ============================================================

/** JMA 震度スケール定義 */
const INTENSITY_SCALE = [
  { lo: 6.5, label: '7',  color: '#770077' },
  { lo: 6.0, label: '6強', color: '#990000' },
  { lo: 5.5, label: '6弱', color: '#cc0000' },
  { lo: 5.0, label: '5強', color: '#ff3300' },
  { lo: 4.5, label: '5弱', color: '#ff6600' },
  { lo: 3.5, label: '4',  color: '#ff9900' },
  { lo: 2.5, label: '3',  color: '#ffff00' },
  { lo: 1.5, label: '2',  color: '#22cc55' },
  { lo: 0.5, label: '1',  color: '#00aaee' },
  { lo: -Infinity, label: '0', color: '#444c56' },
];


// ============================================================
// ① 純粋ロジック関数（副作用なし）
// ============================================================

/** 計測震度 → JMA スケールエントリ */
function intensityEntry(val) {
  return INTENSITY_SCALE.find(s => val >= s.lo) ?? INTENSITY_SCALE[INTENSITY_SCALE.length - 1];
}

/** 計測震度 → 色 */
function intensityToColor(val) {
  return intensityEntry(val).color;
}

/** 計測震度 → ラベル */
function intensityToLabel(val) {
  return intensityEntry(val).label;
}

/** 計測震度 → CircleMarker 半径 */
function intensityToRadius(val) {
  if (val >= 5.0) return 9;
  if (val >= 3.5) return 7;
  if (val >= 2.5) return 5;
  if (val >= 0.5) return 4;
  return 3;
}

/** stations 配列 → 震度帯別集計 [{label, color, count, lo}] */
function calcBands(stations) {
  return INTENSITY_SCALE.map(s => ({
    label: s.label,
    color: s.color,
    lo:    s.lo,
    count: stations.filter(st => st.intensity >= s.lo &&
             (s === INTENSITY_SCALE[0] || st.intensity < INTENSITY_SCALE[INTENSITY_SCALE.indexOf(s) - 1].lo)
           ).length,
  })).filter(b => b.count > 0);
}

/** stations 配列 → 強度降順上位 N 件 */
function calcTopN(stations, n = 5) {
  return [...stations]
    .sort((a, b) => b.intensity - a.intensity)
    .slice(0, n);
}

/** 数値 → 小数点以下2桁固定文字列 */
function fmt2(v) { return v.toFixed(2); }

/** 数値 → 小数点以下1桁固定文字列 */
function fmt1(v) { return v.toFixed(1); }


// ============================================================
// ② 描画関数（DOM操作のみ）
// ============================================================

/** ヘッダーのメタ情報を描画する */
function renderMeta(el, meta) {
  el.innerHTML =
    `<span style="font-family:var(--mono);font-size:10px;color:var(--text-mid)">` +
    `生成: ${meta.generated_at}</span>`;
}

/** サイドバー：震源情報を描画する */
function renderSrcInfo(el, meta) {
  const rows = [
    ['緯度',  `${fmt2(meta.lat)} °N`],
    ['経度',  `${fmt2(meta.lon)} °E`],
    ['深さ',  `${meta.depth} km`],
    ['規模',  `M ${fmt1(meta.mag)}`],
    ['最大震度', fmt2(meta.max_intensity)],
  ];
  el.innerHTML = rows.map(([name, val]) =>
    `<div class="rtm-stat-row">` +
      `<span>${name}</span>` +
      `<span class="rtm-stat-val">${val}</span>` +
    `</div>`
  ).join('');
}

/** サイドバー：震度帯別バーを描画する */
function renderBands(el, bands, total) {
  if (!bands.length) { el.innerHTML = '<p class="rtm-placeholder">データなし</p>'; return; }
  const maxCount = Math.max(...bands.map(b => b.count));
  el.innerHTML = bands.map(b => {
    const barW = Math.max(2, Math.round(b.count / maxCount * 80));
    return `<div class="pred-band-row">` +
      `<span class="pred-band-swatch" style="background:${b.color}"></span>` +
      `<span class="pred-band-label">震度${b.label}</span>` +
      `<span class="pred-band-count">${b.count.toLocaleString()}</span>` +
      `<span class="pred-band-bar" style="width:${barW}px;background:${b.color}"></span>` +
    `</div>`;
  }).join('');
}

/** サイドバー：上位N観測点リストを描画する */
function renderTop5(el, topStations) {
  if (!topStations.length) { el.innerHTML = '<p class="rtm-placeholder">データなし</p>'; return; }
  el.innerHTML = topStations.map(st => {
    const color = intensityToColor(st.intensity);
    return `<div class="rtm-top5-item">` +
      `<span class="rtm-top5-swatch" style="background:${color}"></span>` +
      `<span class="rtm-top5-name">${st.id}</span>` +
      `<span class="rtm-top5-val" style="color:${color}">${fmt2(st.intensity)}</span>` +
    `</div>`;
  }).join('');
}

/** サイドバー：クリック詳細を描画する */
function renderDetail(el, station) {
  if (!station) {
    el.innerHTML = '<p class="rtm-placeholder">地図上の点をクリック</p>';
    return;
  }
  const color = intensityToColor(station.intensity);
  el.innerHTML =
    `<div class="rtm-detail-row">` +
      `<span class="rtm-detail-name">${station.id}</span>` +
      `<span class="rtm-detail-si" style="color:${color}">震度${intensityToLabel(station.intensity)}</span>` +
    `</div>` +
    `<div class="rtm-detail-row">` +
      `<span class="rtm-detail-name">計測震度</span>` +
      `<span class="rtm-detail-si" style="color:${color}">${fmt2(station.intensity)}</span>` +
    `</div>` +
    `<div class="rtm-detail-row">` +
      `<span class="rtm-detail-name">緯度</span>` +
      `<span class="rtm-detail-si">${fmt2(station.lat)} °N</span>` +
    `</div>` +
    `<div class="rtm-detail-row">` +
      `<span class="rtm-detail-name">経度</span>` +
      `<span class="rtm-detail-si">${fmt2(station.lon)} °E</span>` +
    `</div>`;
}

/** Leaflet マップに震源マーカーを追加する */
function renderEpicenter(mapInst, meta) {
  const icon = L.divIcon({
    html: '<span class="pred-epicenter">★</span>',
    className: '',
    iconAnchor: [11, 11],
  });
  L.marker([meta.lat, meta.lon], { icon, interactive: false })
    .addTo(mapInst)
    .bindTooltip(
      `震源 M${fmt1(meta.mag)} 深さ${meta.depth}km`,
      { direction: 'top', offset: [0, -8] }
    );
}

/** Leaflet マップに全観測点マーカーを描画し、Map<id, marker> を返す */
function renderStationMarkers(mapInst, stations, onSelect, renderer) {
  const markersMap = new Map();
  for (const st of stations) {
    const color  = intensityToColor(st.intensity);
    const radius = intensityToRadius(st.intensity);
    const m = L.circleMarker([st.lat, st.lon], {
      renderer,
      radius,
      weight:      st.intensity >= 0.5 ? 0.5 : 0.3,
      color:       st.intensity >= 0.5 ? '#111' : '#333',
      fillColor:   color,
      fillOpacity: st.intensity >= 0.5 ? 0.90 : 0.55,
      opacity:     1.0,
    }).addTo(mapInst);

    const tip = L.tooltip({ direction: 'top', offset: [0, -4] });
    m.on('mouseover', () => {
      tip.setContent(`<b>${st.id}</b><br>計測震度 ${fmt2(st.intensity)}`);
      m.bindTooltip(tip).openTooltip();
    });
    m.on('mouseout',  () => m.unbindTooltip());
    m.on('click', () => onSelect(st));

    markersMap.set(st.id, m);
  }
  // 高震度を前面に
  [...stations]
    .sort((a, b) => a.intensity - b.intensity)
    .forEach(st => markersMap.get(st.id)?.bringToFront());
  return markersMap;
}


// ============================================================
// ③ エントリ関数
// ============================================================

/** DOM 要素を収集する */
function collectPredEls(root = document) {
  const $ = id => root.getElementById(id);
  return {
    meta:    $('pred-meta'),
    srcInfo: $('pred-src-info'),
    bands:   $('pred-bands'),
    top5:    $('pred-top5'),
    detail:  $('pred-detail'),
    mapEl:   $('pred-map'),
  };
}

/** 予測ビューアを初期化する */
function init(data) {
  if (!data) {
    document.body.innerHTML =
      '<p style="color:var(--red);padding:2rem;font-family:var(--mono)">' +
      'PRED_DATA が未設定です。predict.py で HTML を生成してください。</p>';
    return;
  }

  const els      = collectPredEls(document);
  const { meta, stations } = data;
  meta.max_intensity = Math.max(...stations.map(s => s.intensity));

  // サイドバー
  renderMeta(els.meta, meta);
  renderSrcInfo(els.srcInfo, meta);
  renderBands(els.bands, calcBands(stations), stations.length);
  renderTop5(els.top5, calcTopN(stations, 5));
  renderDetail(els.detail, null);

  // 地図
  const mapInst = L.map(els.mapEl, { center: [36.5, 136.0], zoom: 5 });
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; OpenStreetMap &copy; CARTO',
    maxZoom: 18,
  }).addTo(mapInst);

  const renderer = L.canvas({ padding: 0.5 });
  renderEpicenter(mapInst, meta);
  renderStationMarkers(mapInst, stations,
    st => renderDetail(els.detail, st),
    renderer
  );
}


// ============================================================
// スタンドアロン実行
// ============================================================
document.addEventListener('DOMContentLoaded', () => init(PRED_DATA));

/* ═══ 統合ガイド ═══════════════════════════════════════════════
  生成方法  : predict.py --lat XX --lon YY --depth ZZ --mag MM
  出力先    : QuakeView/web/seismic_predict_result.html（自動上書き）
  データ形式: window.PRED_DATA = { meta: {...}, stations: [{id,lat,lon,intensity},...] }
  統合先    : personal.html の <iframe> または <script> で読み込み可能
════════════════════════════════════════════════════════════════ */
</script>
