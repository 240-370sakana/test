<script>
'use strict';

// ============================================================
// ① 純粋ロジック関数（副作用なし・グローバル変数参照なし）
// ============================================================

// ── カラーマップ定数（NIED 強震モニタ準拠, SI: -3.0〜7.0, step 0.1） ──
const SHINDO_COLORMAP = [
  [  0,  0,205],[  0,  7,209],[  0, 14,214],[  0, 21,218],[  0, 28,223],
  [  0, 36,227],[  0, 43,231],[  0, 50,236],[  0, 57,240],[  0, 64,245],
  [  0, 72,250],[  0, 85,238],[  0, 99,227],[  0,112,216],[  0,126,205],
  [  0,140,194],[  0,153,183],[  0,167,172],[  0,180,161],[  0,194,150],
  [  0,208,139],[  6,212,130],[ 12,216,121],[ 18,220,113],[ 25,224,104],
  [ 31,228, 96],[ 37,233, 88],[ 44,237, 79],[ 50,241, 71],[ 56,245, 62],
  [ 63,250, 54],[ 75,250, 49],[ 88,250, 45],[100,251, 41],[113,251, 37],
  [125,252, 33],[138,252, 28],[151,253, 24],[163,253, 20],[176,254, 16],
  [189,255, 12],[195,254, 10],[202,254,  9],[208,254,  8],[215,254,  7],
  [222,255,  5],[228,254,  4],[235,255,  3],[241,254,  2],[248,255,  1],
  [255,255,  0],[254,251,  0],[254,248,  0],[254,244,  0],[254,241,  0],
  [255,238,  0],[254,234,  0],[255,231,  0],[254,227,  0],[255,224,  0],
  [255,221,  0],[254,213,  0],[254,205,  0],[254,197,  0],[254,190,  0],
  [255,182,  0],[254,174,  0],[255,167,  0],[254,159,  0],[255,151,  0],
  [255,144,  0],[254,136,  0],[254,128,  0],[254,121,  0],[254,113,  0],
  [255,106,  0],[254, 98,  0],[255, 90,  0],[254, 83,  0],[255, 75,  0],
  [255, 68,  0],[254, 61,  0],[253, 54,  0],[252, 47,  0],[251, 40,  0],
  [250, 33,  0],[249, 27,  0],[248, 20,  0],[247, 13,  0],[246,  6,  0],
  [245,  0,  0],[238,  0,  0],[230,  0,  0],[223,  0,  0],[215,  0,  0],
  [208,  0,  0],[200,  0,  0],[192,  0,  0],[185,  0,  0],[177,  0,  0],
  [170,  0,  0],
];
const SI_MIN  = -3.0;
const SI_STEP =  0.1;

/** 震度スケール凡例エントリ（サイドバーの凡例を buildLegend に渡す） */
const LEGEND_ENTRIES = [
  { si: 7.0, label: '7'  }, { si: 6.5, label: '6強' },
  { si: 6.0, label: '6弱' }, { si: 5.5, label: '5強' },
  { si: 5.0, label: '5弱' }, { si: 4.0, label: '4'  },
  { si: 3.0, label: '3'  }, { si: 2.0, label: '2'  },
  { si: 1.0, label: '1'  }, { si: 0.0, label: '0'  },
];

/** デフォルト音声パス（サーバールートからの絶対パス） */
const RTM_DEFAULT_SOUND_PATHS = [
  '/web/sounds/Shindo0.wav',   // level 0: RI >= 0.0
  '/web/sounds/Shindo1.wav',   // level 1: RI >= 0.5
  '/web/sounds/Shindo2.wav',   // level 2: RI >= 4.0
];

/** Leaflet マップデフォルト設定（日本中心） */
const RTM_DEFAULT_MAP_OPTIONS = {
  center: [36.5, 136.0],
  zoom:   5,
  tileUrl: 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',
  tileAttr: '&copy; CARTO | 強震モニタ: 防災科研',
};

/**
 * 震度値 → CSS rgb 文字列（NIED カラーマップ）
 * @param {number|null} si  震度値
 * @returns {string|null}   "rgb(r,g,b)" or null
 */
function shindoToColor(si) {
  if (si == null) return null;
  const idx = Math.round(Math.max(0, Math.min(100, (si - SI_MIN) / SI_STEP)));
  const [r, g, b] = SHINDO_COLORMAP[idx];
  return `rgb(${r},${g},${b})`;
}

/**
 * 震度値 → Leaflet CircleMarker の半径(px)
 * @param {number|null} si
 * @returns {number}
 */
function shindoToRadius(si) {
  if (si == null) return 5;
  return 6 + Math.max(0, si - 1.0) * 2.0;
}

/**
 * 最大震度 → アラート情報
 * level: null=検知なし  0=微弱(RI≥0.0)  1=弱い(RI≥0.5)  2=強い(RI≥4.0)
 *
 * @param {number|null} maxSi
 * @returns {{ level: number|null, message: string }}
 */
function calcAlertLevel(maxSi) {
  if (maxSi === null) return { level: null, message: '' };
  if (maxSi >= 4.0)  return { level: 2, message: `強い揺れを検知 (RI ≥ 4.0)` };
  if (maxSi >= 0.5)  return { level: 1, message: `弱い揺れを検知 (RI ≥ 0.5)` };
  /* maxSi >= 0.0 */ return { level: 0, message: `微弱な揺れを検知 (RI ≥ 0.0)` };
}

/**
 * 空間クラスタ検出による地震判定
 * 半径 CLUSTER_RADIUS 度以内に CLUSTER_RI_MIN 以上の観測点が
 * MIN_CLUSTER_SIZE 点以上集中した場合のみ検知とみなす。
 * 生活振動（局所 1〜2 点の高 RI）を誤検知しないための対策。
 *
 * @param {Array<{ shindo:number|null, lat:number, lon:number, name:string }>} stations
 * @returns {{ level: number|null, message: string }}
 */
function calcClusterAlert(stations) {
  const CLUSTER_RI_MIN   = 0.5;   // クラスタとして数える最低 RI
  const CLUSTER_RADIUS   = 1.0;   // 緯度経度差（約 100km）
  const MIN_CLUSTER_SIZE = 3;     // 自点を含む最低クラスタ点数

  const active = stations.filter(
    st => st.lat != null && st.lon != null && st.shindo != null && st.shindo >= CLUSTER_RI_MIN
  );

  const none = { level: null, message: '', clusterStations: [] };
  if (active.length < MIN_CLUSTER_SIZE) return none;

  const r2 = CLUSTER_RADIUS * CLUSTER_RADIUS;
  let bestSize = 0, bestMaxSi = null, bestStations = [];

  for (const st of active) {
    const neighbors = active.filter(other => {
      const dlat = other.lat - st.lat;
      const dlon = other.lon - st.lon;
      return dlat * dlat + dlon * dlon <= r2;
    });
    if (neighbors.length > bestSize) {
      bestSize     = neighbors.length;
      bestMaxSi    = Math.max(...neighbors.map(n => n.shindo));
      bestStations = neighbors.slice().sort((a, b) => b.shindo - a.shindo);
    }
  }

  if (bestSize < MIN_CLUSTER_SIZE) return none;

  if (bestMaxSi >= 4.0) return { level: 2, message: `強い揺れを検知 (RI ≥ 4.0, ${bestSize}点)`, clusterStations: bestStations };
  if (bestMaxSi >= 0.5) return { level: 1, message: `弱い揺れを検知 (RI ≥ 0.5, ${bestSize}点)`, clusterStations: bestStations };
  return                       { level: 0, message: `微弱な揺れを検知 (RI ≥ 0.0, ${bestSize}点)`, clusterStations: bestStations };
}

/**
 * 地震クラスタ検知を /api/notify 経由で Discord に送信する
 * 新規検知またはレベル上昇時のみ呼び出すこと
 *
 * @param {number}   level           alertInfo.level (1 or 2)
 * @param {Array<{ name:string, code:string, shindo:number }>} clusterStations  RI 降順
 */
async function sendDiscordNotification(level, clusterStations) {
  if (!clusterStations.length) return;
  const top    = clusterStations[0];
  const header = level >= 2
    ? `【地震検知！】${top.name}で強い揺れ`
    : `【地震検知】${top.name}で弱い揺れ`;
  const lines  = clusterStations
    .map(st => `${st.name}(${st.code}) ${st.shindo.toFixed(1)}`)
    .join('\n');
  try {
    await fetch('/api/notify', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ content: `${header}\n${lines}` }),
    });
  } catch (e) {
    console.warn('[Discord] 通知送信失敗:', e);
  }
}

/**
 * 観測点配列 → 統計オブジェクト
 * px/py が (0,0) の無効観測点は除外する（強震モニタの仕様）
 *
 * @param {Array<{ shindo:number|null, name:string, px:number, py:number }>} stations
 * @returns {{ total:number, active:number, maxSi:number|null, maxName:string }}
 */
function calcStats(stations) {
  let active = 0, maxSi = null, maxName = '-';
  for (const st of stations) {
    if (st.px === 0 && st.py === 0) continue;   // 無効観測点をスキップ
    if (st.shindo !== null) {
      active++;
      if (maxSi === null || st.shindo > maxSi) { maxSi = st.shindo; maxName = st.name; }
    }
  }
  return { total: stations.length, active, maxSi, maxName };
}

/**
 * UNIX ミリ秒 → 日本時間 HH:MM:SS 文字列
 * toLocaleTimeString で Asia/Tokyo を明示指定（環境非依存）
 *
 * @param {number} ms  UNIX ミリ秒
 * @returns {string}   例: "13:45:02"
 */
function formatJST(ms) {
  return new Date(ms).toLocaleTimeString('ja-JP', {
    hour12: false,
    timeZone: 'Asia/Tokyo',
  });
}

/**
 * 最終更新からの経過時間でデータの陳腐化を判定する
 *
 * @param {number|null} lastMs      最終更新の UNIX ミリ秒（未取得時は null）
 * @param {number}      nowMs       現在の UNIX ミリ秒
 * @param {number}      thresholdMs 陳腐化とみなす閾値(ms)
 * @returns {boolean}
 */
function isStale(lastMs, nowMs, thresholdMs) {
  return lastMs !== null && (nowMs - lastMs) > thresholdMs;
}


// ============================================================
// ② 描画関数（DOM操作のみ・引数で受け取る）
// ============================================================

/**
 * サイドバーの凡例リストを生成して containerEl に挿入する
 * 既存の内容は全て置換する
 *
 * @param {HTMLElement}                             containerEl  挿入先要素
 * @param {Array<{ si:number, label:string }>}      entries      凡例エントリ配列
 * @param {(si:number|null) => string|null}         colorFn      shindoToColor 互換
 */
function buildLegend(containerEl, entries, colorFn) {
  containerEl.innerHTML = '';

  // 震度ラベル別のスウォッチ
  entries.forEach(({ si, label }) => {
    const color = colorFn(si);
    const item  = document.createElement('div');
    item.className = 'rtm-legend-item';
    // 動的カラーマップ値のため CSS 変数ではなく計算 RGB を直接使用（設計上の例外）
    item.innerHTML =
      `<span class="rtm-legend-swatch" style="background:${color}"></span>` +
      `<span class="rtm-legend-label">${label}</span>`;
    containerEl.appendChild(item);
  });

  // グラデーションバー（SI -3 〜 0 の連続値域）
  const gradItem = document.createElement('div');
  gradItem.className = 'rtm-legend-item rtm-legend-item--grad';
  gradItem.innerHTML =
    `<span class="rtm-legend-grad"></span>` +
    `<span class="rtm-legend-grad-labels"><span>0</span><span>-3</span></span>`;
  containerEl.appendChild(gradItem);
}

/**
 * 観測点詳細パネルを更新する
 * station が null の場合は初期状態（プレースホルダー）に戻す
 *
 * @param {HTMLElement}   containerEl
 * @param {{ code:string, name:string, shindo:number|null }|null} station
 * @param {(si:number|null) => string|null} colorFn
 */
function updateDetailPanel(containerEl, station, colorFn) {
  if (!station) {
    containerEl.innerHTML = `<p class="rtm-placeholder">地図上の点を選択</p>`;
    return;
  }
  const siLabel = station.shindo !== null ? station.shindo.toFixed(1) : '観測なし';
  // 動的カラーマップ値のため CSS 変数ではなく計算 RGB を直接使用（設計上の例外）
  const siColor = colorFn(station.shindo) || 'var(--text-mid)';
  containerEl.innerHTML =
    `<div class="rtm-detail-row">` +
      `<span class="rtm-detail-label">名称</span>` +
      `<span>${station.name || '-'}</span>` +
    `</div>` +
    `<div class="rtm-detail-row">` +
      `<span class="rtm-detail-label">コード</span>` +
      `<span>${station.code}</span>` +
    `</div>` +
    `<div class="rtm-detail-row">` +
      `<span class="rtm-detail-label">震度</span>` +
      `<span style="font-weight:700;color:${siColor}">${siLabel}</span>` +
    `</div>`;
}

/**
 * 統計パネルの各 DOM テキストを更新する
 *
 * @param {{ totalEl, activeEl, maxEl, maxNameEl }} els   各テキストノード要素
 * @param {{ total, active, maxSi, maxName }}       stats  calcStats() の戻り値
 */
function updateStatsPanel(els, stats) {
  els.totalEl.textContent   = stats.total;
  els.activeEl.textContent  = stats.active;
  els.maxEl.textContent     = stats.maxSi !== null ? stats.maxSi.toFixed(1) : '-';
  els.maxNameEl.textContent = stats.maxName;
}

/**
 * アラートブロックの表示状態と内容を更新する
 *
 * @param {HTMLElement}                            blockEl
 * @param {HTMLElement}                            msgEl
 * @param {{ level:number|null, message:string }}  alertInfo  calcAlertLevel() の戻り値
 */
function updateAlertPanel(blockEl, msgEl, alertInfo) {
  if (alertInfo.level !== null) {
    blockEl.hidden    = false;
    msgEl.textContent = alertInfo.message;
  } else {
    blockEl.hidden    = true;
    msgEl.textContent = '';
  }
}

/**
 * フェッチインジケーターの状態クラスと通信エラーテキストを更新する
 * status: 'ok' | 'error' | 'stale'
 *
 * @param {HTMLElement} indicatorEl
 * @param {HTMLElement} errorEl
 * @param {{ status: string, message?: string }} opts
 */
function updateFetchStatus(indicatorEl, errorEl, { status, message = '' }) {
  indicatorEl.className = 'rtm-indicator' + (status !== 'ok' ? ` ${status}` : '');
  errorEl.textContent   = message;
}

/**
 * ヘッダー時計の表示を UNIX ミリ秒から更新する（JST 変換）
 *
 * @param {HTMLElement} clockEl
 * @param {number}      ms  UNIX ミリ秒
 */
function updateClock(clockEl, ms) {
  clockEl.textContent = formatJST(ms);
}

/**
 * Leaflet CircleMarker を取得または生成してキャッシュする
 *
 * 設計上の注意:
 *   マーカーは一度生成されると再生成されないため、ホバー時に常に
 *   最新の震度を表示するために m._rtmRef（可変参照オブジェクト）を使う。
 *   updateMarkerStyle() がこの参照を毎ポールで更新することで整合性を保つ。
 *
 * @param {L.Map}                              mapInst
 * @param {Map<string, L.CircleMarker>}        markersMap  コード → マーカーキャッシュ
 * @param {{ code, lat, lon, name, shindo }}   station
 * @param {(ref: object) => void}              onSelect    クリック時コールバック
 * @returns {L.CircleMarker}
 */
function getOrCreateMarker(mapInst, markersMap, station, onSelect) {
  if (markersMap.has(station.code)) return markersMap.get(station.code);

  const m = L.circleMarker([station.lat, station.lon], {
    radius: 5, weight: 1,
    color: '#555', fillColor: '#222',
    fillOpacity: 0.9, opacity: 0.8,
  }).addTo(mapInst);

  // ホバーツールチップ用の可変参照（毎ポールで updateMarkerStyle が更新する）
  m._rtmRef = { shindo: station.shindo, name: station.name, code: station.code };

  // 常時表示ラベル（zoom-high クラスが付いた時のみ CSS で表示）
  m.bindTooltip(station.code, {
    permanent: true, direction: 'bottom',
    className: 'rtm-station-label', offset: [0, 10],
  });

  // ホバーツールチップ（_rtmRef 参照で常に最新値を表示）
  const hoverTip = L.tooltip({ direction: 'top', offset: [0, -5] });
  m.on('mouseover', () => {
    const ref     = m._rtmRef;
    const siLabel = ref.shindo != null ? ref.shindo.toFixed(1) : '観測なし';
    hoverTip.setContent(
      `<b>${ref.name}</b><br>code: ${ref.code}<br>RI = ${siLabel}`
    );
    m.bindTooltip(hoverTip).openTooltip();
  });
  m.on('mouseout', () => {
    m.unbindTooltip();
    m.bindTooltip(station.code, {
      permanent: true, direction: 'bottom',
      className: 'rtm-station-label', offset: [0, 10],
    });
  });

  m.on('click', () => onSelect(m._rtmRef));

  markersMap.set(station.code, m);
  return m;
}

/**
 * マーカーの Leaflet スタイルと _rtmRef（最新震度）を同期する
 * 観測なし（shindo=null）は灰色で表示する
 *
 * @param {Map<string, L.CircleMarker>}                    markersMap
 * @param {{ code, lat, lon, shindo, name }}               station
 * @param {(si:number|null) => string|null}                colorFn
 * @param {(si:number|null) => number}                     radiusFn
 */
function updateMarkerStyle(markersMap, station, colorFn, radiusFn) {
  if (station.lat === null || station.lon === null) return;
  const m = markersMap.get(station.code);
  if (!m) return;

  // _rtmRef を常に最新に保つ（ホバーツールチップが参照する）
  if (m._rtmRef) {
    m._rtmRef.shindo = station.shindo;
    m._rtmRef.name   = station.name;
  }

  const color  = colorFn(station.shindo);
  const radius = radiusFn(station.shindo);
  if (color) {
    m.setStyle({ radius, fillColor: color, color: '#000', weight: 0.5, fillOpacity: 0.95, opacity: 1.0 });
  } else {
    m.setStyle({ radius: 5, fillColor: '#444c56', color: '#768390', weight: 0.8, fillOpacity: 0.9, opacity: 0.8 });
  }
}


// ============================================================
// ③ 統合用エントリ関数
// ============================================================

/**
 * /api/shindo レスポンスを受け取り、マップと全 UI を一括更新する
 *
 * 責務:
 *   - 純粋関数（calcStats, calcAlertLevel 等）を呼び出して値を計算
 *   - 描画関数（updateXxx）に DOM 参照と計算値を渡して描画
 *   - 音声再生（アラートレベル変化時のみ、audioState.unlocked が true の場合）
 *   - 更新後の state 差分を返す（state 自体の書き換えは呼び出し元が行う）
 *
 * @param {L.Map}                              mapInst
 * @param {Map<string, L.CircleMarker>}        markersMap
 * @param {Object}                             data       /api/shindo レスポンス
 * @param {{ selectedCode, alertLevel, lastUpdateMs }} state
 * @param {{ indicator, errorMsg, clock, detail,
 *           alertBlock, alertMsg, audioBtn,
 *           statTotal, statActive, statMax, statMaxName }} els
 * @param {{ sounds: Audio[], unlocked: boolean }}          audioState
 * @returns {{ selectedCode, alertLevel, lastUpdateMs }}
 */
function onShindoData(mapInst, markersMap, data, state, els, audioState) {
  // ── エラー応答 ──────────────────────────────────────────
  if (data.error) {
    updateFetchStatus(els.indicator, els.errorMsg, { status: 'error', message: data.error });
    return { ...state };
  }

  updateFetchStatus(els.indicator, els.errorMsg, { status: 'ok' });
  const lastUpdateMs = Date.now();

  // ── マーカー更新 ────────────────────────────────────────
  for (const st of data.stations) {
    if (st.px === 0 && st.py === 0) continue;   // 無効観測点をスキップ

    // onSelect コールバック:
    //   state と els をクロージャで参照（呼び出し元スコープ内の意図的なバインド）
    getOrCreateMarker(mapInst, markersMap, st, (ref) => {
      state.selectedCode = ref.code;
      updateDetailPanel(els.detail, ref, shindoToColor);
    });
    updateMarkerStyle(markersMap, st, shindoToColor, shindoToRadius);
  }

  // ── 選択中観測点の詳細を最新データで更新 ───────────────
  if (state.selectedCode) {
    const sel = data.stations.find(s => s.code === state.selectedCode);
    if (sel) updateDetailPanel(els.detail, sel, shindoToColor);
  }

  // ── 統計 ────────────────────────────────────────────────
  const stats = calcStats(data.stations);
  updateStatsPanel(
    { totalEl:   els.statTotal,   activeEl: els.statActive,
      maxEl:     els.statMax,     maxNameEl: els.statMaxName },
    stats
  );

  // ── アラート ─────────────────────────────────────────────
  const alertInfo = calcClusterAlert(data.stations);
  updateAlertPanel(els.alertBlock, els.alertMsg, alertInfo);

  // ── 音声再生（レベル変化時のみ、副作用を局所化） ────────
  if (alertInfo.level !== null && alertInfo.level !== state.alertLevel) {
    if (audioState.unlocked) {
      const snd = audioState.sounds[alertInfo.level];
      snd.currentTime = 0;
      snd.play().catch(e => console.warn('[Audio] 再生失敗:', e));
      els.audioBtn.className = 'btn rtm-audio-btn alerting';
    } else {
      console.warn('[Audio] 音声 OFF。ヘッダーのボタンで有効化してください。');
    }
  } else if (alertInfo.level === null && state.alertLevel !== null && audioState.unlocked) {
    els.audioBtn.className = 'btn rtm-audio-btn enabled';   // アラート解除後に色を戻す
  }

  // ── Discord 通知（新規検知またはレベル上昇時のみ） ────────
  if (alertInfo.level !== null &&
      (state.alertLevel === null || alertInfo.level > state.alertLevel)) {
    sendDiscordNotification(alertInfo.level, alertInfo.clusterStations);
  }

  // ── 時計（data.time は ISO 文字列または UNIX ms、JST 変換して表示） ──
  if (data.time) updateClock(els.clock, new Date(data.time).getTime());

  return { selectedCode: state.selectedCode, alertLevel: alertInfo.level, lastUpdateMs };
}

/**
 * このHTML固有のDOM要素を収集して initRealtimeMap に渡す config を組み立てる
 *
 * ─ 設計意図 ─────────────────────────────────────────────────
 * initRealtimeMap は DOM ID を知らない。
 * ページ固有の ID → HTMLElement のマッピングをこの関数に集約することで、
 * ホストページが別の ID 体系を使う場合も同じ initRealtimeMap を呼び出せる。
 *
 * @param {Document|HTMLElement} [root=document]  検索ルート
 * @param {string[]}             [soundPaths]     音声ファイルパス配列（省略時はデフォルト）
 * @returns {{
 *   mapEl:      HTMLElement,
 *   legendEl:   HTMLElement,
 *   soundPaths: string[],
 *   els: {
 *     indicator:   HTMLElement,
 *     errorMsg:    HTMLElement,
 *     clock:       HTMLElement,
 *     detail:      HTMLElement,
 *     alertBlock:  HTMLElement,
 *     alertMsg:    HTMLElement,
 *     audioBtn:    HTMLElement,
 *     statTotal:   HTMLElement,
 *     statActive:  HTMLElement,
 *     statMax:     HTMLElement,
 *     statMaxName: HTMLElement,
 *   }
 * }}
 */
function collectRtmEls(root = document, soundPaths = RTM_DEFAULT_SOUND_PATHS) {
  // Document は getElementById、HTMLElement は querySelector('#id') を使う
  const $ = id =>
    typeof root.getElementById === 'function'
      ? root.getElementById(id)
      : root.querySelector('#' + id);

  return {
    mapEl:      $('rtm-map'),
    legendEl:   $('rtm-legend-items'),
    soundPaths,
    els: {
      indicator:   $('rtm-fetch-indicator'),
      errorMsg:    $('rtm-error-msg'),
      clock:       $('rtm-clock'),
      detail:      $('rtm-detail-content'),
      alertBlock:  $('rtm-alert-block'),
      alertMsg:    $('rtm-alert-msg'),
      audioBtn:    $('rtm-audio-toggle'),
      statTotal:   $('rtm-stat-total'),
      statActive:  $('rtm-stat-active'),
      statMax:     $('rtm-stat-max'),
      statMaxName: $('rtm-stat-max-name'),
    },
  };
}

/**
 * リアルタイムマップモジュールを初期化する
 *
 * ─ 設計方針 ─────────────────────────────────────────────────
 * ・すべての DOM 参照は config から受け取る（document.getElementById は呼ばない）
 * ・Leaflet マップインスタンスは mapEl から内部生成して返す
 * ・setInterval は定義しない（呼び出し元の既存ループに統合するため）
 * ・初期化は呼び出し元が明示的に実行する
 *
 * @param {{
 *   mapEl:       HTMLElement,
 *   legendEl:    HTMLElement,
 *   soundPaths:  string[],
 *   els: {
 *     indicator, errorMsg, clock, detail,
 *     alertBlock, alertMsg, audioBtn,
 *     statTotal, statActive, statMax, statMaxName
 *   },
 *   mapOptions?: {
 *     center?:   [number, number],
 *     zoom?:     number,
 *     tileUrl?:  string,
 *     tileAttr?: string,
 *   }
 * }} config
 *
 * @returns {{
 *   mapInst:    L.Map,
 *   markersMap: Map<string, L.CircleMarker>,
 *   poll:       () => Promise<void>,
 *   tick:       () => void
 * }}
 */
function initRealtimeMap(config) {
  const {
    mapEl,
    legendEl,
    els,
    soundPaths,
    mapOptions = {},
  } = config;

  const {
    center   = RTM_DEFAULT_MAP_OPTIONS.center,
    zoom     = RTM_DEFAULT_MAP_OPTIONS.zoom,
    tileUrl  = RTM_DEFAULT_MAP_OPTIONS.tileUrl,
    tileAttr = RTM_DEFAULT_MAP_OPTIONS.tileAttr,
  } = mapOptions;

  // ── Leaflet マップ ─────────────────────────────────────
  const mapInst = L.map(mapEl, { center, zoom });
  L.tileLayer(tileUrl, { attribution: tileAttr }).addTo(mapInst);

  // ズームレベル ≥ 9 で zoom-high クラスを付与 → CSS がラベルを表示
  const LABEL_ZOOM_THRESHOLD = 9;
  mapInst.on('zoomend', () => {
    mapInst.getContainer().classList.toggle(
      'zoom-high', mapInst.getZoom() >= LABEL_ZOOM_THRESHOLD
    );
  });

  // ── マーカーキャッシュ ────────────────────────────────
  const markersMap = new Map();   // code (string) → L.CircleMarker

  // ── 凡例生成 ─────────────────────────────────────────
  buildLegend(legendEl, LEGEND_ENTRIES, shindoToColor);

  // ── 音声 ─────────────────────────────────────────────
  // ブラウザの Autoplay Policy: ユーザー操作で一度 play→pause してアンロックする
  const audioState = {
    sounds:   soundPaths.map(p => new Audio(p)),
    unlocked: false,
  };

  els.audioBtn.addEventListener('click', () => {
    if (!audioState.unlocked) {
      // volume=0 で全サウンドを無音 play → pause してアンロック
      Promise.all(audioState.sounds.map(s => {
        s.volume = 0;
        return s.play().then(() => { s.pause(); s.currentTime = 0; s.volume = 1.0; });
      })).then(() => {
        audioState.unlocked      = true;
        els.audioBtn.textContent = '🔔 音声ON';
        els.audioBtn.className   = 'btn rtm-audio-btn enabled';
        console.info('[Audio] アンロック完了。自動再生が許可されました。');
      }).catch(e => console.warn('[Audio] アンロック失敗:', e));
    } else {
      audioState.unlocked      = false;
      els.audioBtn.textContent = '🔇 音声OFF';
      els.audioBtn.className   = 'btn rtm-audio-btn';
      console.info('[Audio] 音声アラートを無効化しました。');
    }
  });

  // ── 状態オブジェクト ──────────────────────────────────
  // 純粋関数へは引数として渡す。
  // onSelect コールバックからのクリックは selectedCode を直接変更するため
  // オブジェクト参照として保持する（意図的な副作用の局所化）。
  const state = {
    selectedCode:  null,    // 選択中の観測点コード
    alertLevel:    null,    // 直前のアラートレベル（音変化判定に使用）
    lastUpdateMs:  null,    // 最終成功取得の UNIX ミリ秒
  };

  // ── ポーリング関数 ────────────────────────────────────
  // 呼び出し元が poll() を定期実行する（setInterval はここで定義しない）
  async function poll() {
    try {
      const res  = await fetch('/api/shindo?_=' + Date.now());
      const data = await res.json();
      const next = onShindoData(mapInst, markersMap, data, state, els, audioState);
      state.alertLevel   = next.alertLevel;
      state.lastUpdateMs = next.lastUpdateMs;
    } catch (e) {
      updateFetchStatus(els.indicator, els.errorMsg, {
        status:  'error',
        message: `通信エラー: ${e.message}`,
      });
    }
  }

  // ── Tick 関数（陳腐化チェック） ───────────────────────
  // poll とは独立して動作するため、既存ループに個別に統合できる
  // 呼び出し元が tick() を定期実行する（setInterval はここで定義しない）
  function tick() {
    if (isStale(state.lastUpdateMs, Date.now(), 5000)) {
      updateFetchStatus(els.indicator, els.errorMsg, { status: 'stale', message: '' });
    }
  }

  return { mapInst, markersMap, poll, tick };
}


// ============================================================
// スタンドアロン実行ブロック
// ─────────────────────────────────────────────────────────────
// QuakeView_personal に統合する場合はこのブロックを削除し、
// 既存メインループから rtm.poll() / rtm.tick() を呼び出すこと。
//
// ── 統合手順（4ステップ）─────────────────────────────────────
//
//  STEP 1: このHTML の DOM を QuakeView_personal のレイアウトに配置する
//          （panel クラス等で囲んでも可）
//
//  STEP 2: ホストページの初期化関数内で collectRtmEls を呼び出す
//          ※ ID がホスト側と衝突する場合は collectRtmEls の代わりに
//            直接 { mapEl, legendEl, els, soundPaths } を組み立てること
//
//          const rtm = initRealtimeMap(
//            collectRtmEls(document)   // または hostRoot を渡す
//          );
//
//  STEP 3: 既存のメインループに poll / tick を組み込む
//
//          function existingMainLoop() {   // ← 既存ループ関数に追記
//            rtm.poll();   // 非同期・独立して動く
//            rtm.tick();   // 同期・陳腐化チェック
//          }
//
//  STEP 4: rtm_additions.css の内容を quakeview.css 末尾に append する
// ============================================================
document.addEventListener('DOMContentLoaded', () => {
  const config = collectRtmEls(document);
  const rtm    = initRealtimeMap(config);

  // 初回即時取得
  rtm.poll();

  // 定期更新（1秒ごと）
  // QuakeView_personal 統合時はこの setInterval を削除し、
  // 既存ループ内で rtm.poll() / rtm.tick() を呼び出すこと
  setInterval(() => {
    rtm.poll();
    rtm.tick();
  }, 1000);
});
</script>
